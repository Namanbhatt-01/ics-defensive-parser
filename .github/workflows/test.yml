name: Python ICS Compliance Auditor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Linting & Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit

    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 ics_defensive_parser tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 ics_defensive_parser tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security Scan with Bandit
      run: |
        # Run Bandit to scan for common security vulnerabilities in python code
        bandit -r ics_defensive_parser/ tests/ -ll -ii

    - name: Run Automated Compliance Test Suite
      run: |
        python tests/run_compliance_tests.py
